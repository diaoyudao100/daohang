<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080812;--bg2:#0e0e1a;--bg3:#14141f;--a:#7c6aff;--a2:#ff6ab0;--a3:#6af0ff;--t:#e8e8f4;--t2:#9090b8;--t3:#5a5a80;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--sh:0 8px 32px rgba(0,0,0,0.4);--r:14px;--r2:10px;--r3:8px;--blur:blur(12px)}
[data-theme=light]{--bg:#f0f0fa;--bg2:#e8e8f5;--bg3:#ffffff;--t:#1a1a2e;--t2:#555580;--t3:#9090b8;--bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--sh:0 8px 32px rgba(0,0,0,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);color:var(--t);font-family:Inter,Noto Sans SC,sans-serif;overflow-x:hidden;transition:background .3s,color .3s}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px}
#topbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:10px 24px;position:sticky;top:0;z-index:100;background:rgba(8,8,18,0.75);backdrop-filter:var(--blur);border-bottom:1px solid var(--bd)}
[data-theme=light] #topbar{background:rgba(240,240,250,0.85)}
.tb-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--bd2);border-radius:var(--r3);background:rgba(255,255,255,0.05);color:var(--t2);font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;line-height:1}
.tb-btn:hover{background:rgba(255,255,255,0.1);color:var(--t);border-color:var(--a)}
.tb-btn.active{background:var(--a);color:#fff;border-color:var(--a)}
#sync-status{font-size:12px;color:var(--t3);padding:4px 10px;border-radius:20px;border:1px solid var(--bd);user-select:none;cursor:default}
#user-wrap{position:relative}
#user-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:6px;min-width:160px;display:none;z-index:200;box-shadow:var(--sh)}
#user-dropdown.show{display:block}
.dd-item{padding:8px 12px;border-radius:var(--r3);cursor:pointer;font-size:13px;color:var(--t2);transition:all .2s;display:flex;align-items:center;gap:8px;border:none;background:transparent;width:100%;font-family:inherit;text-align:left}
.dd-item:hover{background:rgba(255,255,255,0.07);color:var(--t)}
.dd-item.danger{color:#ff6b6b}
.dd-item.danger:hover{background:rgba(255,107,107,0.1)}
#hero{text-align:center;padding:20px 0 8px}
#clock{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:300;letter-spacing:2px;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
#date-row{font-size:14px;color:var(--t2);margin:5px 0 3px}
#greet{font-size:13px;color:var(--t3);margin-bottom:0}
#avatar-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;margin-bottom:4px}
#avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--a);object-fit:cover}
#nav-title{font-size:17px;font-weight:500;color:var(--t);outline:none;border-bottom:1px solid transparent;transition:border .2s}
#nav-title[contenteditable=true]{border-bottom-color:var(--a)}
#nav-sub{font-size:12px;color:var(--t3);margin-bottom:2px}
#search-wrap{max-width:560px;margin:10px auto 0;padding:0 16px}
#engine-pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:9px}
.epill{padding:4px 12px;border-radius:20px;border:1px solid var(--bd2);background:rgba(255,255,255,0.04);color:var(--t2);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.epill.on{background:var(--a);color:#fff;border-color:var(--a)}
.epill:hover:not(.on){border-color:var(--a);color:var(--t)}
#search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);border:1px solid var(--bd2);border-radius:28px;padding:8px 8px 8px 18px;backdrop-filter:var(--blur)}
[data-theme=light] #search-box{background:rgba(0,0,0,0.04)}
#q{flex:1;border:none;background:transparent;color:var(--t);font-size:15px;outline:none;font-family:inherit}
#q::placeholder{color:var(--t3)}
#search-btn{padding:8px 18px;background:linear-gradient(135deg,var(--a),var(--a2));border:none;border-radius:20px;color:#fff;font-size:14px;cursor:pointer;transition:opacity .2s;font-family:inherit}
#search-btn:hover{opacity:.85}
#infobar{display:flex;gap:12px;justify-content:center;align-items:center;padding:8px 0;font-size:12px;color:var(--t3);flex-wrap:wrap;border-bottom:1px solid var(--bd)}
.ib-item{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid var(--bd)}
#tabs-wrap{border-bottom:1px solid var(--bd);position:sticky;top:49px;z-index:90;background:rgba(8,8,18,0.88);backdrop-filter:var(--blur)}
[data-theme=light] #tabs-wrap{background:rgba(240,240,250,0.92)}
#tabs{display:flex;overflow-x:auto;padding:0 24px;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;border-top:none;border-left:none;border-right:none;background:transparent;font-family:inherit}
.tab:hover{color:var(--t)}
.tab.on{color:var(--a);border-bottom-color:var(--a)}
#add-cat-btn{padding:11px 14px;font-size:13px;color:var(--a);cursor:pointer;border:none;background:transparent;font-family:inherit;white-space:nowrap;display:none}
.edit-mode #add-cat-btn{display:block}
#cards-area{padding:18px 24px 40px;min-height:300px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:500;color:var(--t);display:flex;align-items:center;gap:7px}
.pinned-section{margin-bottom:22px;padding-bottom:14px;border-bottom:1px dashed var(--bd)}
.pinned-label{font-size:11px;color:var(--t3);margin-bottom:7px;letter-spacing:.6px}
#add-card-btn{display:none;align-items:center;gap:5px;padding:6px 14px;border:1px dashed var(--a);border-radius:var(--r3);color:var(--a);background:transparent;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
.edit-mode #add-card-btn{display:flex}
#add-card-btn:hover{background:rgba(124,106,255,0.08)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px}
.cards-grid.simple{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px}
.card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .25s;position:relative;display:flex;flex-direction:column;gap:7px;text-decoration:none;color:inherit;animation:fadeUp .3s ease both}
.card:hover{transform:translateY(-3px);border-color:var(--a);box-shadow:0 6px 20px rgba(124,106,255,0.18)}
.card.pinned-card{border-color:rgba(124,106,255,0.35)}
.card.card-simple{flex-direction:row;align-items:center;padding:10px 13px;gap:10px}
.card.card-simple .card-desc{display:none}
.card.card-simple .card-icon{font-size:20px;height:22px;flex-shrink:0}
.card-icon{font-size:24px;line-height:1;height:28px;display:flex;align-items:center}
.card-icon img{width:24px;height:24px;border-radius:4px;object-fit:cover}
.card-name{font-size:13px;font-weight:500;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-desc{font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-pin-badge{position:absolute;top:6px;right:6px;font-size:9px;color:var(--a);opacity:.7}
.card-edit-btn{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;background:var(--a);color:#fff;border:none;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;transition:opacity .2s;font-family:inherit}
.edit-mode .card:hover .card-edit-btn{display:flex}
.card.dragging{opacity:.35;border-style:dashed}
.card.drag-over{border-color:var(--a2);background:rgba(255,106,176,0.06)}
#ctx-menu{position:fixed;z-index:9999;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:5px;min-width:175px;box-shadow:var(--sh);display:none}
#ctx-menu.show{display:block;animation:fadeUp .15s ease}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 13px;border-radius:var(--r3);font-size:13px;color:var(--t2);cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;font-family:inherit;text-align:left;white-space:nowrap}
.ctx-item:hover{background:rgba(255,255,255,0.07);color:var(--t)}
.ctx-item.danger{color:#ff6b6b}
.ctx-item.danger:hover{background:rgba(255,107,107,0.1)}
.ctx-sep{height:1px;background:var(--bd);margin:4px 8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--bd2);border-radius:20px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh);animation:fadeUp .25s ease}
.modal-wide{max-width:580px}
.modal-title{font-size:17px;font-weight:600;color:var(--t);margin-bottom:18px}
.form-group{margin-bottom:13px}
.form-label{font-size:12px;color:var(--t2);margin-bottom:4px;display:block}
.form-input{width:100%;padding:9px 13px;background:rgba(255,255,255,0.06);border:1px solid var(--bd2);border-radius:var(--r3);color:var(--t);font-size:14px;outline:none;transition:border .2s;font-family:inherit}
[data-theme=light] .form-input{background:rgba(0,0,0,0.05)}
.form-input:focus{border-color:var(--a)}
.form-input::placeholder{color:var(--t3)}
select.form-input option{background:var(--bg3);color:var(--t)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.ai-hint{font-size:12px;color:var(--a);margin-top:4px;min-height:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn{padding:9px 18px;border-radius:var(--r3);border:none;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;line-height:1}
.btn-primary{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:rgba(255,255,255,0.07);color:var(--t2);border:1px solid var(--bd2)}
.btn-ghost:hover{background:rgba(255,255,255,0.12);color:var(--t)}
.btn-danger{background:rgba(255,107,107,0.12);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3)}
.btn-danger:hover{background:rgba(255,107,107,0.22)}
#note-textarea{width:100%;height:190px;resize:vertical;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--bd2);border-radius:var(--r3);color:var(--t);font-size:14px;outline:none;font-family:inherit;line-height:1.6}
[data-theme=light] #note-textarea{background:rgba(0,0,0,0.05)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--bd2);border-radius:30px;padding:9px 20px;font-size:13px;color:var(--t);box-shadow:var(--sh);z-index:10000;transition:all .3s;opacity:0;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
.settings-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--bd)}
.stab{padding:9px 14px;font-size:13px;color:var(--t2);cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.stab.on{color:var(--a);border-bottom-color:var(--a)}
.stab-panel{display:none}
.stab-panel.on{display:block}
.cat-list-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.cat-list-item:last-child{border-bottom:none}
.cat-list-icon{font-size:18px;width:28px;text-align:center}
.cat-list-name{flex:1;font-size:13px;color:var(--t)}
.cat-list-actions{display:flex;gap:6px}
.cat-list-btn{padding:4px 10px;border-radius:var(--r3);border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.cat-list-btn:hover{border-color:var(--a);color:var(--a)}
.cat-list-btn.danger:hover{border-color:#ff6b6b;color:#ff6b6b}
.accent-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s;border:2px solid transparent;outline:none}
.swatch.active{border-color:var(--t);transform:scale(1.15)}
.style-btns{display:flex;gap:8px;margin-top:8px}
.style-btn{flex:1;padding:10px;border-radius:var(--r3);border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.style-btn.active{border-color:var(--a);color:var(--a);background:rgba(124,106,255,0.08)}
@media(max-width:640px){
#topbar{padding:6px 10px;gap:5px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
.tb-btn{padding:7px 9px;min-width:34px;justify-content:center}
.tb-txt{display:none}
#sync-status{font-size:11px;padding:4px 7px;white-space:nowrap;flex-shrink:0}
#user-dropdown{right:0}
.wrap{padding:0 12px}
#hero{padding:14px 0 6px}
#clock{font-size:clamp(2rem,10vw,3rem)}
#search-wrap{padding:0 4px}
#search-btn{padding:8px 12px;font-size:13px}
#cards-area{padding:12px 12px 32px}
.cards-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.cards-grid.simple{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.modal{padding:18px 16px;border-radius:16px;max-height:88vh;width:calc(100% - 24px);max-width:100%;position:relative;bottom:auto;left:auto;right:auto}
.overlay{padding:12px;align-items:center}
.card{min-height:60px}
.form-row{flex-direction:column;gap:0}
#tabs{padding:0 12px}
.tab{padding:10px 12px;font-size:12px}
#infobar{flex-wrap:nowrap;gap:6px;padding:6px 0;overflow-x:auto;scrollbar-width:none}
#infobar::-webkit-scrollbar{display:none}
.ib-item{padding:3px 7px;font-size:11px;white-space:nowrap;flex-shrink:0}
}
.md-preview{flex:1;overflow-y:auto;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--bd2);border-radius:var(--r3);font-size:14px;line-height:1.7;color:var(--t)}
.md-preview h1,.md-preview h2,.md-preview h3{color:var(--t);margin:.6em 0 .3em;font-weight:600}
.md-preview h1{font-size:1.3em}.md-preview h2{font-size:1.15em}.md-preview h3{font-size:1em}
.md-preview p{margin:.4em 0}
.md-preview code{background:rgba(255,255,255,0.1);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px}
.md-preview pre{background:rgba(0,0,0,0.3);padding:10px;border-radius:var(--r3);overflow-x:auto;margin:.5em 0}
.md-preview pre code{background:none;padding:0}
.md-preview ul,.md-preview ol{padding-left:1.4em;margin:.3em 0}
.md-preview li{margin:.15em 0}
.md-preview blockquote{border-left:3px solid var(--a);padding:.2em .8em;margin:.4em 0;color:var(--t2)}
.md-preview a{color:var(--a);text-decoration:none}
.md-preview hr{border:none;border-top:1px solid var(--bd);margin:.6em 0}
.md-preview strong{color:var(--t);font-weight:600}
.note-tab-btns{display:flex;gap:6px;margin-bottom:6px}
.note-tab-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.note-tab-btn.on{background:var(--a);color:#fff;border-color:var(--a)}
.cat-tag-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.cat-tag-btn.on{background:var(--a);color:#fff;border-color:var(--a)}
.card-search-hl{background:rgba(124,106,255,0.25);border-radius:2px}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="topbar">
  <div id="sync-status">未登录</div>
  <div id="card-search-wrap" style="display:none;position:relative">
    <input id="card-search-input" class="form-input" placeholder="搜索书签..." style="width:180px;padding:5px 30px 5px 10px;font-size:13px;height:32px">
    <span id="card-search-clear" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--t3);font-size:14px">✕</span>
  </div>
  <button class="tb-btn" id="card-search-btn">🔍<span class="tb-txt"> 搜索</span></button>
  <button class="tb-btn" id="note-btn">📝<span class="tb-txt"> 便笺</span></button>
  <button class="tb-btn" id="io-btn">📂<span class="tb-txt"> 导入导出</span></button>
  <button class="tb-btn" id="settings-btn">⚙️<span class="tb-txt"> 设置</span></button>
  <button class="tb-btn" id="edit-btn">✏️<span class="tb-txt"> 编辑</span></button>
  <button class="tb-btn" id="theme-btn">🌙<span class="tb-txt"> 主题</span></button>
  <div id="user-wrap">
    <button class="tb-btn" id="user-btn">🔑<span class="tb-txt"> 登录</span></button>
    <div id="user-dropdown">
      <button class="dd-item" id="dd-invite" style="display:none">🎟 生成邀请码</button>
      <button class="dd-item" id="dd-switch">🔄 切换账户</button>
      <button class="dd-item danger" id="dd-logout">🚪 退出登录</button>
    </div>
  </div>
</div>
<div class="wrap">
  <div id="hero">
    <div id="avatar-wrap">
      <img id="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 52 52'%3E%3Ccircle cx='26' cy='26' r='26' fill='%237c6aff'/%3E%3Ctext x='26' y='32' text-anchor='middle' font-size='22' fill='white'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E" alt="avatar">
    </div>
    <div id="nav-title" contenteditable="false" spellcheck="false">我的导航</div>
    <div id="nav-sub">收藏常用网站 &middot; 一键直达</div>
    <div id="clock">00:00:00</div>
    <div id="date-row">加载中...</div>
    <div id="greet"></div>
  </div>
  <div id="search-wrap">
    <div id="engine-pills">
      <button class="epill on" data-url="https://www.google.com/search?q=">Google</button>
      <button class="epill" data-url="https://www.bing.com/search?q=">Bing</button>
      <button class="epill" data-url="https://www.baidu.com/s?wd=">百度</button>
      <button class="epill" data-url="https://search.bilibili.com/all?keyword=">B站</button>
      <button class="epill" data-url="https://github.com/search?q=">GitHub</button>
    </div>
    <div id="search-box">
      <input id="q" type="text" placeholder="搜索或输入网址..." autocomplete="off">
      <button id="search-btn">🔍</button>
    </div>
  </div>
  <div id="infobar">
    <span class="ib-item">📅 <span id="ib-date">-</span></span>
    <span class="ib-item">⏰ <span id="ib-time">-</span></span>
    <span class="ib-item">🗓 <span id="ib-week">-</span></span>
    <span class="ib-item">📆 <span id="ib-weeknum">-</span></span>
  </div>
</div>
<div id="tabs-wrap"><div class="wrap" style="padding:0"><div id="tabs"></div></div></div>
<div class="wrap"><div id="cards-area"></div></div>
<div id="ctx-menu">

function getWeekNum(d){var s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);}

function initParticles(){var canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');var W,H,pts;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}function mkPts(){pts=Array.from({length:50},function(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1};});}function draw(){if(localStorage.getItem('nav_bg_url')){requestAnimationFrame(draw);return;}ctx.clearRect(0,0,W,H);var light=document.documentElement.dataset.theme==='light';var pc=light?'rgba(100,80,220,':'rgba(124,106,255,';pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=pc+'0.6)';ctx.fill();});for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=pc+(1-d/120)*0.15+')';ctx.stroke();}}requestAnimationFrame(draw);}resize();mkPts();draw();window.addEventListener('resize',function(){resize();mkPts();});}

function makeCard(card){var el=document.createElement(editMode?'div':'a');el.className='card'+(card.pinned?' pinned-card':'')+(cardStyle==='simple'?' card-simple':'');el.dataset.id=card.id;if(!editMode){el.href=card.url;el.target='_blank';el.rel='noopener';}var iconEl=document.createElement('div');iconEl.className='card-icon';var iconVal=card.icon||'';if(iconVal.startsWith('http')||iconVal.startsWith('data:')){var img=document.createElement('img');img.src=iconVal;img.onerror=function(){this.replaceWith(document.createTextNode('🌐'));};iconEl.appendChild(img);}else{iconEl.textContent=iconVal||'🌐';}el.appendChild(iconEl);var nameEl=document.createElement('div');nameEl.className='card-name';nameEl.textContent=card.name;el.appendChild(nameEl);if(card.desc&&cardStyle!=='simple'){var descEl=document.createElement('div');descEl.className='card-desc';descEl.textContent=card.desc;el.appendChild(descEl);}if(card.pinned&&!editMode){var pb=document.createElement('span');pb.className='card-pin-badge';pb.textContent='📌';el.appendChild(pb);}if(editMode){var eb=document.createElement('button');eb.className='card-edit-btn';eb.textContent='✎';eb.onclick=function(e){e.stopPropagation();openCardModal(card);};el.appendChild(eb);el.onclick=function(){openCardModal(card);};el.draggable=true;el.ondragstart=function(e){dragSrc=card.id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';};el.ondragend=function(){el.classList.remove('dragging');document.querySelectorAll('.card').forEach(function(c){c.classList.remove('drag-over');});};el.ondragover=function(e){e.preventDefault();el.classList.add('drag-over');};el.ondragleave=function(){el.classList.remove('drag-over');};el.ondrop=function(e){e.preventDefault();el.classList.remove('drag-over');handleDrop(card.id);};}else{el.addEventListener('contextmenu',function(e){e.preventDefault();showCtxMenu(e,card);});}return el;}

function schedulSync(){if(!token)return;setSyncStatus('待同步...');clearTimeout(syncTimer);syncTimer=setTimeout(pushCloud,SYNC_DELAY);}
async function pullCloud(){if(!token)return;setSyncStatus('同步中...');try{var r=await fetch('/api/data',{headers:{'Authorization':'Bearer '+token}}),d=await r.json();if(r.status===401){token=null;currentUser=null;isAdmin=false;localStorage.removeItem('nav_token');localStorage.removeItem('nav_user');localStorage.removeItem('nav_is_admin');updateUserUI();toast('登录已过期，请重新登录');return;}if(d.ok&&d.data){if(d.data.cats)cats=d.data.cats;if(d.data.cards)cards=d.data.cards;if(d.data.notes)notes=d.data.notes;activeCat=cats[0]?cats[0].id:null;saveLocal();renderTabs();renderCards();setSyncStatus('上次同步 '+(d.data.syncAt?new Date(d.data.syncAt).toLocaleTimeString():''));// 自动续期
fetch('/api/refresh',{method:'POST',headers:{'Authorization':'Bearer '+token}}).catch(function(){});}else setSyncStatus('已登录');}catch(e){setSyncStatus('离线');}}
async function pushCloud(){if(!token)return;setSyncStatus('同步中...');try{var r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({cats:cats,cards:cards,notes:notes})});var d=await r.json();if(d.ok)setSyncStatus('✅ 已同步 '+(d.syncAt?new Date(d.syncAt).toLocaleTimeString():''));else setSyncStatus('❌ 同步失败');}catch(e){setSyncStatus('❌ 网络错误');}}

function importBookmarks(html){var parser=new DOMParser(),doc=parser.parseFromString(html,'text/html');var imported=[],catMap={},genericRoots=['Bookmarks Bar','书签栏','Other Bookmarks','其他书签'];function traverse(el,pathArr){Array.from(el.children).forEach(function(node){if(node.tagName==='DT'){var h3=node.querySelector('h3'),a=node.querySelector('a'),dl=node.querySelector('dl');if(h3&&dl)traverse(dl,pathArr.concat([h3.textContent.trim()]));else if(a){var url=a.getAttribute('href');if(!url||url.startsWith('chrome://')||url.startsWith('about:'))return;var folder=pathArr.filter(function(s){return genericRoots.indexOf(s)<0;}),catName=folder.length?folder.join(' / '):'导入书签';if(!catMap[catName]){var cid='bm_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);catMap[catName]=cid;cats.push({id:cid,name:catName,icon:'🔖'});}imported.push({id:'bm'+Date.now()+Math.random().toString(36).slice(2,5),cat:catMap[catName],icon:'🌐',name:a.textContent.trim()||url,desc:'',url:url});}}});}var rootDl=doc.querySelector('dl');if(rootDl)traverse(rootDl,[]);cards=cards.concat(imported);if(!activeCat&&cats.length)activeCat=cats[0].id;saveLocal();renderTabs();renderCards();document.getElementById('io-modal').classList.remove('show');toast('导入了 '+imported.length+' 个书签');}

function editCat(id,btn){var cat=cats.find(function(c){return c.id===id;});if(!cat)return;var item=btn.closest('.cat-list-item');item.innerHTML='';var iconWrap=document.createElement('span');iconWrap.className='cat-list-icon';var iconInput=document.createElement('input');iconInput.className='form-input';iconInput.id='ei-icon';iconInput.value=cat.icon;iconInput.style.cssText='width:50px;font-size:18px;text-align:center;padding:4px';iconWrap.appendChild(iconInput);var nameWrap=document.createElement('span');nameWrap.className='cat-list-name';var nameInput=document.createElement('input');nameInput.className='form-input';nameInput.id='ei-name';nameInput.value=cat.name;nameWrap.appendChild(nameInput);var actions=document.createElement('div');actions.className='cat-list-actions';var saveBtn=document.createElement('button');saveBtn.className='cat-list-btn';saveBtn.textContent='保存';saveBtn.onclick=function(){saveCatEdit(cat.id,saveBtn);};var cancelBtn=document.createElement('button');cancelBtn.className='cat-list-btn';cancelBtn.textContent='取消';cancelBtn.onclick=function(){renderCatManager();};actions.appendChild(saveBtn);actions.appendChild(cancelBtn);item.appendChild(iconWrap);item.appendChild(nameWrap);item.appendChild(actions);}

// 手机端：模态框下滑关闭
(function(){
  var isMobile=function(){return window.innerWidth<=640;};
  document.querySelectorAll('.overlay').forEach(function(overlay){
    var modal=overlay.querySelector('.modal');
    if(!modal)return;
    var startY=0,startX=0,isDragging=false;
    modal.addEventListener('touchstart',function(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      startY=e.touches[0].clientY;startX=e.touches[0].clientX;isDragging=true;
    },{passive:true});
    modal.addEventListener('touchmove',function(e){
      if(!isDragging||!isMobile())return;
      var dy=e.touches[0].clientY-startY,dx=e.touches[0].clientX-startX;
      if(dy>0&&Math.abs(dy)>Math.abs(dx)){modal.style.transform='translateY('+dy+'px)';modal.style.transition='none';}
    },{passive:true});
    modal.addEventListener('touchend',function(e){
      if(!isDragging||!isMobile()){modal.style.transform='';modal.style.transition='';isDragging=false;return;}
      var dy=e.changedTouches[0].clientY-startY;
      if(dy>80){modal.style.transition='transform .25s ease';modal.style.transform='translateY(100%)';setTimeout(function(){overlay.classList.remove('show');modal.style.transform='';modal.style.transition='';},220);}
      else{modal.style.transition='transform .2s ease';modal.style.transform='';}
      isDragging=false;
    },{passive:true});
  });
})();

// 手机端：触摸拖拽卡片排序
(function(){
  var touchSrc=null,touchClone=null;
  document.getElementById('cards-area').addEventListener('touchstart',function(e){
    if(!editMode)return;
    var card=e.target.closest('.card[draggable]');
    if(!card)return;
    touchSrc=card.dataset.id;
    card.classList.add('dragging');
    touchClone=card.cloneNode(true);
    touchClone.style.cssText='position:fixed;z-index:9999;opacity:.7;pointer-events:none;width:'+card.offsetWidth+'px;border:2px solid var(--a);border-radius:14px;';
    document.body.appendChild(touchClone);
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!touchSrc||!touchClone)return;
    var t=e.touches[0];
    touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';
    touchClone.style.top=(t.clientY-touchClone.offsetHeight/2)+'px';
    var el=document.elementFromPoint(t.clientX,t.clientY);
    var target=el&&el.closest('.card[draggable]');
    document.querySelectorAll('.card').forEach(function(c){c.classList.remove('drag-over');});
    if(target&&target.dataset.id!==touchSrc)target.classList.add('drag-over');
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!touchSrc)return;
    var t=e.changedTouches[0];
    var el=document.elementFromPoint(t.clientX,t.clientY);
    var target=el&&el.closest('.card[draggable]');
    if(target&&target.dataset.id!==touchSrc)handleDrop(target.dataset.id);
    document.querySelectorAll('.card').forEach(function(c){c.classList.remove('dragging');c.classList.remove('drag-over');});
    if(touchClone){touchClone.remove();touchClone=null;}
    touchSrc=null;
  },{passive:true});
})();

// 便笺 Markdown 渲染
function simpleMarkdown(md){
  var escaped=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[*-] (.+)$/gm,'<li>$1</li>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(<h[123]>|<blockquote>|<hr>|<ul>|<li>|<pre>)/,'$1')
    .replace(/^(?!<)/gm,'<p>')
    .replace(/(?<!>)$/gm,'</p>')
    .replace(/<p><\/p>/g,'');
}
document.getElementById('note-tab-edit').addEventListener('click',function(){
  this.classList.add('on');document.getElementById('note-tab-preview').classList.remove('on');
  document.getElementById('note-textarea').style.display='';
  document.getElementById('note-preview').style.display='none';
});
document.getElementById('note-tab-preview').addEventListener('click',function(){
  this.classList.add('on');document.getElementById('note-tab-edit').classList.remove('on');
  document.getElementById('note-textarea').style.display='none';
  var preview=document.getElementById('note-preview');
  preview.style.display='';
  preview.innerHTML=simpleMarkdown(document.getElementById('note-textarea').value||'*暂无内容*');
});

// 书签搜索
var cardSearchActive=false,cardSearchQuery='';
document.getElementById('card-search-btn').addEventListener('click',function(){
  cardSearchActive=!cardSearchActive;
  var wrap=document.getElementById('card-search-wrap');
  wrap.style.display=cardSearchActive?'flex':'';
  if(cardSearchActive){document.getElementById('card-search-input').focus();}
  else{cardSearchQuery='';document.getElementById('card-search-input').value='';renderCards();}
  this.classList.toggle('active',cardSearchActive);
});
document.getElementById('card-search-input').addEventListener('input',function(){
  cardSearchQuery=this.value.trim().toLowerCase();
  if(cardSearchQuery)renderSearchResults();else renderCards();
});
document.getElementById('card-search-clear').addEventListener('click',function(){
  document.getElementById('card-search-input').value='';
  cardSearchQuery='';
  renderCards();
});
function renderSearchResults(){
  var area=document.getElementById('cards-area');
  area.innerHTML='';
  var hdr=document.createElement('div');hdr.className='section-header';
  var title=document.createElement('span');title.className='section-title';
  title.textContent='🔍 搜索结果';hdr.appendChild(title);area.appendChild(hdr);
  var q=cardSearchQuery;
  var matched=cards.filter(function(c){
    return c.name.toLowerCase().includes(q)||(c.desc&&c.desc.toLowerCase().includes(q))||(c.url&&c.url.toLowerCase().includes(q));
  });
  if(!matched.length){
    var empty=document.createElement('div');empty.style.cssText='color:var(--t3);font-size:14px;padding:30px 0;text-align:center';
    empty.textContent='没有找到匹配的书签';area.appendChild(empty);return;
  }
  var grid=document.createElement('div');grid.className='cards-grid'+(cardStyle==='simple'?' simple':'');
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  matched.forEach(function(card){
    var el=makeCard(card);
    var nameEl=el.querySelector('.card-name');
    if(nameEl)nameEl.innerHTML=nameEl.textContent.replace(re,'<span class="card-search-hl">$1</span>');
    grid.appendChild(el);
  });
  area.appendChild(grid);
}
});

</script>
</body>
</html>
